<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="icon" type="image/png" href="icon1.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>独立页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        #content { min-height: 100vh; }
        .loading { 
            text-align: center; 
            padding: 80px 20px; 
            color: #999;
            font-size: 16px;
        }
        .loading svg {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .error {
            text-align: center;
            padding: 80px 20px;
            color: #dc2626;
        }
    </style>
</head>
<body>
    <div id="content">
        <div class="loading">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
                <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
            </svg>
            <p>⏳ 加载中...</p>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // ========== 配置区域 ==========
        const SUPABASE_URL = 'https://sqhcbwqrpyzglbcclzzj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxaGNid3FycHl6Z2xiY2NsenpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODIwMDUsImV4cCI6MjA5MTc1ODAwNX0.1-MdHopPxwfzU9Zu78Ae4FiyMazAPswrA4HwcHJKeP0';
        
        // 🔥 在这里修改要加载的页面名称
        const PAGE_NAME = '值守店铺共享';  // 改成您想要的页面名称
        // =============================

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        window.sharedSupabase = supabase;

        const contentDiv = document.getElementById('content');

        async function loadPage(pageName) {
            if (!pageName) {
                contentDiv.innerHTML = `<div class="error"><h3>❌ 错误</h3><p>未指定页面名称</p></div>`;
                return;
            }
            
            const { data, error } = await supabase
                .from('page_code')
                .select('*')
                .eq('page_name', pageName)
                .single();

            if (error) {
                contentDiv.innerHTML = `<div class="error">
                    <h3>❌ 加载失败</h3>
                    <p>${error.message}</p>
                    <p style="margin-top:20px;font-size:14px;">页面 "${pageName}" 不存在</p>
                </div>`;
                document.title = '错误';
                return;
            }

            document.title = pageName;

            // 清除旧样式和脚本
            document.querySelectorAll('style[data-dynamic]').forEach(s => s.remove());
            document.querySelectorAll('script[data-dynamic]').forEach(s => s.remove());

            // 注入 CSS
            if (data.css_content) {
                const style = document.createElement('style');
                style.setAttribute('data-dynamic', 'true');
                style.textContent = data.css_content;
                document.head.appendChild(style);
            }

            // 注入 HTML
            contentDiv.innerHTML = data.html_content || '<div class="loading">暂无内容</div>';

            // 执行 JavaScript
            if (data.js_content) {
                const script = document.createElement('script');
                script.setAttribute('data-dynamic', 'true');
                script.setAttribute('type', 'module');
                script.textContent = data.js_content;
                document.body.appendChild(script);
            }
        }

        // 加载指定页面
        loadPage(PAGE_NAME);
    </script>
</body>
</html>
